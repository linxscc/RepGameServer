location /game/ {
    try_files $uri $uri/ /game/index.html;
}

location ~* ^/game/.*\.wasm\.br$ {
    default_type application/wasm;
    add_header Content-Encoding br always;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

location ~* ^/game/.*\.js\.br$ {
    default_type application/javascript;
    add_header Content-Encoding br always;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

location ~* ^/game/.*\.data\.br$ {
    default_type application/octet-stream;
    add_header Content-Encoding br always;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

location ~* ^/game/.*\.wasm\.gz$ {
    default_type application/wasm;
    add_header Content-Encoding gzip always;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

location ~* ^/game/.*\.js\.gz$ {
    default_type application/javascript;
    add_header Content-Encoding gzip always;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

location ~* ^/game/.*\.data\.gz$ {
    default_type application/octet-stream;
    add_header Content-Encoding gzip always;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

location ~* ^/game/.*\.unityweb$ {
    default_type application/octet-stream;
    add_header Content-Encoding gzip always;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
}

location / {
    try_files $uri $uri/ /index.html;
}

# ── Go backend API (non-Voyara) ──
location ~ ^/(download-items|system-requirements|profile-info|work-experience|normal|product) {
    proxy_pass http://localhost:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    add_header 'Access-Control-Allow-Origin' '$http_origin' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
        add_header 'Access-Control-Max-Age' 3600 always;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
    }
}

# ── Voyara: browser navigation → SPA, API calls → Go backend ──
location /voyara/ {
    # Browser navigation (Accept: text/html) → serve SPA
    if ($http_accept ~* "text/html") {
        rewrite ^ /index.html last;
    }
    # API calls (Accept: application/json) → proxy to Go
    proxy_pass http://localhost:8000;
    proxy_http_version 1.1;
    proxy_intercept_errors on;
    error_page 404 =200 /index.html;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
        add_header 'Access-Control-Max-Age' 3600 always;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
    }
}

location /download/ {
    proxy_pass https://myrepgamebucket.s3.ap-southeast-2.amazonaws.com/repgame-downloads/;
    proxy_set_header Host myrepgamebucket.s3.ap-southeast-2.amazonaws.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    add_header Content-Disposition 'attachment';
    add_header Cache-Control 'no-cache, no-store, must-revalidate';
    add_header Pragma 'no-cache';
    add_header Expires '0';

    proxy_hide_header x-amz-id-2;
    proxy_hide_header x-amz-request-id;
    proxy_hide_header x-amz-meta-server-side-encryption;
    proxy_hide_header x-amz-server-side-encryption;
    proxy_hide_header Set-Cookie;
    proxy_ignore_headers Set-Cookie;
}

location /downloads/ {
    alias /usr/share/nginx/downloads/;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    add_header Content-Disposition 'attachment';
    add_header Cache-Control 'no-cache, no-store, must-revalidate';
}
